name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Run weekly on Sundays at 00:00 UTC to catch new vulnerability patterns
    - cron: '0 0 * * 0'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Use default queries plus security-extended for broader coverage
          queries: security-extended

      # Autobuild attempts to build any compiled languages
      # For JS/TS this extracts the code for analysis
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # Separate job to enforce severity-based blocking on PRs
  check-alerts:
    name: Check Security Alerts
    if: github.event_name == 'pull_request'
    needs: analyze
    runs-on: ubuntu-latest

    permissions:
      security-events: read
      pull-requests: read

    steps:
      - name: Check for high/critical alerts
        uses: actions/github-script@v7
        with:
          script: |
            // Get code scanning alerts for this PR
            const { data: alerts } = await github.rest.codeScanning.listAlertsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.ref,
              state: 'open'
            });

            const highCritical = alerts.filter(a =>
              a.rule.security_severity_level === 'critical' ||
              a.rule.security_severity_level === 'high'
            );

            const mediumLow = alerts.filter(a =>
              a.rule.security_severity_level === 'medium' ||
              a.rule.security_severity_level === 'low'
            );

            if (mediumLow.length > 0) {
              console.log(`⚠️  ${mediumLow.length} medium/low severity alert(s) found (non-blocking):`);
              mediumLow.forEach(a => {
                console.log(`  - ${a.rule.id}: ${a.rule.description} (${a.most_recent_instance.location.path})`);
              });
            }

            if (highCritical.length > 0) {
              console.log(`❌ ${highCritical.length} high/critical severity alert(s) found:`);
              highCritical.forEach(a => {
                console.log(`  - ${a.rule.id}: ${a.rule.description} (${a.most_recent_instance.location.path})`);
              });
              core.setFailed(`Found ${highCritical.length} high/critical security alert(s). Please fix before merging.`);
            } else {
              console.log('✅ No high/critical security alerts found');
            }
